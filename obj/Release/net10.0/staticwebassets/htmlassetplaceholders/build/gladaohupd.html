        width: 40px;

        border: 3px solid rgba(16, 190, 106, 0.15);

        border-top-color: rgba(16, 190, 106, 1);

      .loading-text {
        margin-top: 1.25rem;
        color: #888888;
        font-size: 0.78rem;

        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1; }
      }
